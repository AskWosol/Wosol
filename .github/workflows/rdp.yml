name: Windows RDP via Ngrok

on: [push]

jobs:
  rdp-setup:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Download and extract Ngrok
        shell: pwsh
        run: |
          Invoke-WebRequest "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile ngrok.zip
          Expand-Archive ngrok.zip -DestinationPath .\ngrok
          Remove-Item ngrok.zip -Force

      - name: Authenticate Ngrok
        shell: pwsh
        run: |
          $token = "${{ secrets.NGROK_AUTH_TOKEN }}"
          if ([string]::IsNullOrWhiteSpace($token)) {
            Write-Error "NGROK_AUTH_TOKEN is empty! Add it in Settings → Secrets and variables → Actions"
            exit 1
          }
          Write-Output "Token length: $($token.Length) characters"
          & ".\ngrok\ngrok.exe" authtoken $token

      - name: Enable Remote Desktop
        shell: pwsh
        run: |
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" -ErrorAction SilentlyContinue
          New-NetFirewallRule -DisplayName "Allow RDP via Ngrok" -Direction Inbound -Action Allow -Protocol TCP -LocalPort 3389 -ErrorAction SilentlyContinue

      - name: Create RDP User
        shell: pwsh
        run: |
          net user Ham7Office MyStrong123 /add
          net localgroup administrators Ham7Office /add
          reg add "HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon\SpecialAccounts\UserList" /v Ham7Office /t REG_DWORD /d 0 /f

      - name: Start Ngrok and display connection info
        shell: pwsh
        run: |
          Start-Process -FilePath "$pwd\ngrok\ngrok.exe" -ArgumentList "tcp 3389" -NoNewWindow -RedirectStandardOutput ngrok.log

          $timeout = 120
          $tunnelUrl = $null

          while ($timeout -gt 0 -and -not $tunnelUrl) {
            Start-Sleep -Seconds 5
            $timeout -= 5

            try {
              $response = Invoke-RestMethod -Uri "http://127.0.0.1:4040/api/tunnels" -ErrorAction Stop
              if ($response.tunnels.Count -gt 0) {
                $tunnelUrl = $response.tunnels[0].public_url -replace "tcp://", ""
                break
              }
            } catch {
              $logContent = Get-Content ngrok.log -ErrorAction SilentlyContinue
              if ($logContent) {
                $match = $logContent | Select-String -Pattern "tcp://([a-zA-Z0-9\.\-]+:\d+)"
                if ($match) {
                  $tunnelUrl = $match.Matches.Groups[1].Value
                  break
                }
              }
            }
          }

          if (-not $tunnelUrl) {
            Write-Output "::error::Ngrok tunnel failed"
            Get-Content ngrok.log -ErrorAction SilentlyContinue
            exit 1
          }

          Write-Output "::notice::🎉 RDP Ready! Address: $tunnelUrl"
          Write-Output "::notice::Username: Ham7Office"
          Write-Output "::notice::Password: MyStrong123"
          Write-Output "::notice::Open mstsc.exe → Connect to $tunnelUrl"

          while ($true) { Start-Sleep 300 }

      - name: Cleanup
        if: always()
        shell: pwsh
        run: |
          Stop-Process -Name ngrok* -Force -ErrorAction SilentlyContinue
