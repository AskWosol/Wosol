name: Windows RDP via Ngrok

on: [push]

jobs:
  rdp-setup:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Download and extract Ngrok
        shell: pwsh
        run: |
          Invoke-WebRequest "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile ngrok.zip
          Expand-Archive ngrok.zip -DestinationPath .\ngrok
          Remove-Item ngrok.zip -Force

      - name: Authenticate Ngrok
        shell: pwsh
        run: |
          .\ngrok\ngrok.exe authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"

      - name: Enable Remote Desktop
        shell: pwsh
        run: |
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          New-NetFirewallRule -DisplayName "Allow RDP via Ngrok" -Direction Inbound -Action Allow -Protocol TCP -LocalPort 3389

      - name: Create RDP User
        shell: pwsh
        run: |
          net user Ham7Office MyStrong123 /add
          net localgroup administrators Ham7Office /add
          reg add "HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon\SpecialAccounts\UserList" /v Ham7Office /t REG_DWORD /d 0 /f

      - name: Start Ngrok and display connection info
        shell: pwsh
        run: |
          Start-Process -FilePath "$pwd\ngrok\ngrok.exe" -ArgumentList "tcp 3389 --log=stdout" -NoNewWindow -RedirectStandardOutput ngrok.log

          $timeout = 60
          $tunnelUrl = $null

          while ($timeout -gt 0 -and -not $tunnelUrl) {
            Start-Sleep -Seconds 5
            $timeout -= 5

            try {
              $response = Invoke-RestMethod -Uri "http://127.0.0.1:4040/api/tunnels" -ErrorAction Stop
              if ($response.tunnels.Count -gt 0) {
                $tunnelUrl = $response.tunnels[0].public_url -replace "tcp://", ""
              }
            } catch {
              $logContent = Get-Content ngrok.log -ErrorAction SilentlyContinue
              $tunnelUrl = $logContent |
                Select-String -Pattern "tcp://([a-zA-Z0-9\.\-]+:\d+)" |
                ForEach-Object { $_.Matches.Groups[1].Value } |
                Select-Object -First 1
            }
          }

          if (-not $tunnelUrl) {
            Write-Output "::error::Failed to establish Ngrok tunnel after 60 seconds"
            Write-Output "=== Ngrok Log Contents ==="
            Get-Content ngrok.log -ErrorAction SilentlyContinue
            exit 1
          }

          Write-Output "=========================================="
          Write-Output "||        RDP CONNECTION DETAILS        ||"
          Write-Output "=========================================="
          Write-Output "Address: $tunnelUrl"
          Write-Output "Username: Ham7Office"
          Write-Output "Password: MyStrong123"
          Write-Output "------------------------------------------"
          Write-Output "1. Open Remote Desktop (Win+R -> mstsc)"
          Write-Output "2. Connect to: $tunnelUrl"
          Write-Output "3. Use credentials above when prompted"
          Write-Output "=========================================="
          Write-Output "Note: This VM will self-destruct after 6 hours"
          Write-Output "=========================================="

          while ($true) {
            Start-Sleep -Seconds 300
          }

      - name: Force cleanup
        if: always()
        shell: pwsh
        run: |
          Stop-Process -Name "ngrok" -Force -ErrorAction SilentlyContinue
          Stop-Process -Name "rdp" -Force -ErrorAction SilentlyContinue
